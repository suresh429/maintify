name: maintify
description: "Maintify - Manage. Maintain. Simplify."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.4
  flutter_local_notifications: ^17.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_native_splash:
  # ── Background ──────────────────────────────────────────────────────────────
  # Dark navy — matches Flutter SplashScreen gradient start (#141E30)
  color: "#FFFFFF"
  color_dark: "#FFFFFF"

  # ── Logo image ──────────────────────────────────────────────────────────────
  image: assets/app_logo.png
  image_dark: assets/app_logo.png

  # ── Layout ──────────────────────────────────────────────────────────────────
  # Keep content inside safe bounds, no forced fullscreen
  fullscreen: false

  # ── Android (pre-12) ────────────────────────────────────────────────────────
  android: true
  android_gravity: center
  # Scale the icon to ~38 % of the shortest screen edge (standard safe zone)
  android_screen_orientation: portrait

  # ── Android 12+ (API 31+) — windowSplashScreen API ─────────────────────────
  android_12:
    # Solid icon on dark background — white circular badge removed
    image: assets/android12.png
    image_dark: assets/android12.png
    color: "#FFFFFF"
    color_dark: "#FFFFFF"
    # Icon background matches outer background → seamless look
    icon_background_color: "#141E30"
    icon_background_color_dark: "#141E30"

  # ── iOS ─────────────────────────────────────────────────────────────────────
  ios: true
  ios_content_mode: center

flutter_launcher_icons:
  # ── Android ─────────────────────────────────────────────────────────────────
  android: "ic_launcher"
  min_sdk_android: 21

  # Adaptive icon (Android 8+ / API 26+):
  #   • foreground — logo centred within the 72 dp safe zone
  #   • background — white so logo is clearly visible on any shape mask
  adaptive_icon_foreground: "assets/app_logo.png"
  adaptive_icon_background: "#FFFFFF"

  # Legacy icon (< API 26) — white background so logo stands out
  image_path_android: "assets/app_logo.png"

  # ── iOS ─────────────────────────────────────────────────────────────────────
  ios: true
  image_path_ios: "assets/app_logo.png"
  # App Store requirement: no alpha channel in launcher icons
  remove_alpha_ios: true

  # ── Remove web/desktop targets (not needed) ──────────────────────────────────
  web:
    generate: false